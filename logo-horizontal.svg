<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 48" width="100%" height="100%">
  <defs>
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#0052ff" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <style>
      .logo-text { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 900; letter-spacing: 0.1em; }
      .logo-sub { font-family: 'Inter', system-ui, -apple-system, sans-serif; font-weight: 700; letter-spacing: 0.15em; fill: #0052ff; }
      .voxa-txt { fill: #1A1A1A; }
      @media (prefers-color-scheme: dark) {
        .voxa-txt { fill: #FFFFFF; }
      }
    </style>
  </defs>
  <!-- Icon: Circle Speech-bubble wrapper -->
  <g transform="translate(4, 4)">
    <circle cx="20" cy="20" r="18" fill="none" stroke="url(#bubbleGrad)" stroke-width="3" />
    <!-- Pulse wave inside -->
    <path d="M 8 20 L 14 20 L 16 14 L 18 26 L 21 10 L 23 23 L 25 20 L 32 20" fill="none" stroke="url(#bubbleGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
    <!-- Medical Plus sign on bottom right of bubble -->
    <g transform="translate(26, 26)">
      <circle cx="5" cy="5" r="5" fill="#0052ff" />
      <path d="M 5 2.5 L 5 7.5 M 2.5 5 L 7.5 5" stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" />
    </g>
  </g>
  <!-- Text: VOXABOT AI -->
  <text x="56" y="25" class="logo-text voxa-txt" font-size="16">VOXABOT <tspan fill="url(#textGrad)">AI</tspan></text>
  <text x="56" y="37" class="logo-sub" font-size="6.5">AUTOMATING CLINICAL WORKFLOWS</text>
</svg>
